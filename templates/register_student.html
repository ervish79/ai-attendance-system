<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Enrollment | AI System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        .registration-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            margin-top: 20px;
        }
        #webcam-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect for natural movement */
            border-radius: 16px;
        }
        
        /* Form Label HUD styling */
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Neon Status Box */
        .status-box {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
        }
        .status-box.success {
            background: rgba(0, 255, 157, 0.1);
            color: var(--success);
            border: 1px solid var(--success-glow);
        }
        .status-box.error {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger-glow);
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>AI SYSTEM</h2>
                <p class="user-tag">ROOT_ACCESS: <span>{{ current_user.name | upper }}</span></p>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-camera-retro"></i> <span>Live Scanner</span></a>
                <a href="/dashboard" class="nav-link"><i class="fas fa-layer-group"></i> <span>Data Center</span></a>
                <a href="/register_student" class="nav-link active"><i class="fas fa-user-shield"></i> <span>Enrollment</span></a>
            </div>
            <div class="sidebar-footer">
                <a href="/logout" class="btn-logout"><i class="fas fa-power-off"></i> <span>Terminate</span></a>
            </div>
        </nav>

        <main class="main-content">
            <header class="page-header">
                <div class="header-text">
                    <h1>Biometric_Profile_Initialization</h1>
                    <p>Map facial geometry to the encrypted student database.</p>
                </div>
            </header>

            <div class="registration-grid">
                <div class="scanner-container">
                    <div class="scanner-wrapper" id="visual-frame" style="background: #000; min-height: 480px; border-radius: 16px;">
                        <div class="scan-line"></div>
                        <div class="hud-telemetry top-left">ENROLL_MODE: 1:NEW <br> SENSOR: CMOS_ACTIVE</div>
                        <div class="hud-telemetry top-right">ISO: AUTO <br> RESOLUTION: 720P</div>
                        
                        <video id="webcam-preview" autoplay playsinline></video>
                        
                        <div class="hud-overlay">
                            <div class="corner-bracket top-left"></div>
                            <div class="corner-bracket top-right"></div>
                            <div class="corner-bracket bottom-left"></div>
                            <div class="corner-bracket bottom-right"></div>
                        </div>
                    </div>
                </div>

                <aside class="info-panel">
                    <div class="card">
                        <h3 style="margin-bottom: 25px;"><i class="fas fa-id-card"></i> Enrollment Form</h3>
                        
                        <div class="modern-form">
                            <div class="input-group">
                                <label>Full Name</label>
                                <input type="text" id="reg_name" placeholder="Enter Student Name" required autocomplete="off">
                            </div>

                            <div class="input-group">
                                <label>Student Name</label>
                                <input type="text" id="reg_roll" placeholder="Enter Roll Number" required autocomplete="off">
                            </div>

                            <div class="input-group">
                                <label>Assign to Class</label>
                                <select id="reg_class" class="modern-select">
                                    <option value="">-- Fetching Classes --</option>
                                </select>
                            </div>

                            <div id="status-box" class="status-box" style="display:none; font-family: 'JetBrains Mono'; font-size: 0.75rem;"></div>

                            <div class="control-btns" style="margin-top: 20px;">
                                <button id="captureBtn" class="btn-action primary" style="width: 100%; margin-bottom: 10px;">
                                    <i class="fas fa-user-plus"></i> Enroll Student
                                </button>
                                <a href="/dashboard" class="btn-action" style="display: block; text-decoration:none; text-align:center; background: #2d323a; color: #fff; width: 100%; padding: 12px; border-radius: 8px;">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <canvas id="hiddenCanvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam-preview');
        const canvas = document.getElementById('hiddenCanvas');
        const statusBox = document.getElementById('status-box');

        // 1. Start Webcam for Registration
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                showStatus("CAMERA_ACCESS_DENIED", "error");
            }
        }

        // 2. Load Classes for the Dropdown
        async function loadClasses() {
            const classSelect = document.getElementById('reg_class');
            try {
                const res = await fetch('/api/get_management_data');
                const data = await res.json();
                if(data.success) {
                    classSelect.innerHTML = '<option value="">-- ASSIGN_CLASS --</option>';
                    data.classes.forEach(c => {
                        classSelect.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
                    });
                }
            } catch (err) {
                classSelect.innerHTML = '<option value="">ERR: NO_DATA</option>';
            }
        }

        // 3. Capture & Upload
        document.getElementById('captureBtn').addEventListener('click', async () => {
            const name = document.getElementById('reg_name').value;
            const roll = document.getElementById('reg_roll').value;
            const classId = document.getElementById('reg_class').value;

            if(!name || !roll || !classId) {
                showStatus("ERR: INCOMPLETE_DATA", "error");
                return;
            }

            showStatus("UPLOADING_BIOMETRICS...", "success");
            statusBox.className = "status-box"; // reset colors while loading

            // Draw current frame to hidden canvas
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch('/api/register_student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        roll_no: roll,
                        class_id: classId,
                        image: imageData
                    })
                });

                const result = await response.json();
                if(result.success) {
                    showStatus("SUCCESS: PROFILE_INDEXED", "success");
                    // Clear form
                    document.getElementById('reg_name').value = '';
                    document.getElementById('reg_roll').value = '';
                } else {
                    showStatus("FAIL: " + result.message.toUpperCase(), "error");
                }
            } catch (err) {
                showStatus("COMM_FAILURE", "error");
            }
        });

        function showStatus(msg, type) {
            statusBox.style.display = 'block';
            statusBox.innerText = `[LOG]: ${msg}`;
            statusBox.className = `status-box ${type}`;
        }

        // Initialize
        startCamera();
        loadClasses();
    </script>
</body>
</html>
