<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH_GATEWAY | AI System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Login Specific Overrides */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        .auth-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.1), inset 0 0 20px rgba(0, 210, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* HUD Scanning Line Effect inside card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: scanCard 3s linear infinite;
        }

        @keyframes scanCard {
            0% { top: 0; opacity: 1; }
            50% { top: 100%; opacity: 0.2; }
            100% { top: 0; opacity: 1; }
        }

        .auth-header {
            margin-bottom: 25px; /* Slightly reduced to fit tabs */
        }

        .auth-header i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .auth-header h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn-auth {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-auth:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .error-msg {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="login-card">
            <div class="auth-header">
                <i class="fas fa-fingerprint"></i>
                <h2>AUTH_GATEWAY</h2>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button id="tab_staff" onclick="switchLoginTab('staff')" class="btn-auth" style="padding: 10px; font-size: 0.85rem; flex: 1; background: var(--accent); color: #000;">
                    <i class="fas fa-user-shield"></i> STAFF
                </button>
                <button id="tab_student" onclick="switchLoginTab('student')" class="btn-auth" style="padding: 10px; font-size: 0.85rem; flex: 1; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--glass-border);">
                    <i class="fas fa-user-graduate"></i> STUDENT
                </button>
            </div>

            <div id="staffLoginSection">
                {% if error %}
                <div class="error-msg">
                    <i class="fas fa-exclamation-triangle"></i> ERR: {{ error | upper }}
                </div>
                {% endif %}
                
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label for="username">USER_NAME</label>
                        <input type="text" id="username" name="username" placeholder="Enter Username" required autofocus autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">SECURITY_KEY</label>
                        <input type="password" id="password" name="password" placeholder="Enter Password" required>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        AUTHORIZE <i class="fas fa-chevron-right" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>

            <div id="studentLoginSection" style="display: none; padding: 10px 0;">
                <i class="fas fa-satellite-dish" style="font-size: 2.5rem; color: #00d2ff; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(0,210,255,0.5));"></i>
                <h3 style="font-family: 'JetBrains Mono', monospace; color: #fff; margin-bottom: 10px; font-size: 1.2rem;">Public Telemetry</h3>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5;">Access the Read-Only Student Portal to view your real-time attendance records and eligibility status.</p>
                
                <button onclick="window.location.href='/student'" class="btn-auth" style="background: #00d2ff; color: #000;">
                    ENTER To Student Portal <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </div>

        </div>
    </div>

    <script>
        function switchLoginTab(mode) {
            const staffForm = document.getElementById('staffLoginSection');
            const studentSec = document.getElementById('studentLoginSection');
            const btnStaff = document.getElementById('tab_staff');
            const btnStudent = document.getElementById('tab_student');

            if (mode === 'staff') {
                // Show Staff
                staffForm.style.display = 'block';
                studentSec.style.display = 'none';
                
                // Style Staff Tab (Active)
                btnStaff.style.background = 'var(--accent)';
                btnStaff.style.color = '#000';
                btnStaff.style.border = 'none';
                
                // Style Student Tab (Inactive)
                btnStudent.style.background = 'rgba(0,0,0,0.5)';
                btnStudent.style.color = '#fff';
                btnStudent.style.border = '1px solid var(--glass-border)';
            } else {
                // Show Student
                staffForm.style.display = 'none';
                studentSec.style.display = 'block';
                
                // Style Student Tab (Active)
                btnStudent.style.background = '#00d2ff';
                btnStudent.style.color = '#000';
                btnStudent.style.border = 'none';
                
                // Style Staff Tab (Inactive)
                btnStaff.style.background = 'rgba(0,0,0,0.5)';
                btnStaff.style.color = '#fff';
                btnStaff.style.border = '1px solid var(--glass-border)';
            }
        }
    </script>
</body>
</html>
